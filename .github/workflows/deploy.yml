name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Sanitize secrets (strip any accidental whitespace/newlines from copy-paste)
        run: |
          echo "VITE_SUPABASE_URL=$(printf '%s' "${{ secrets.VITE_SUPABASE_URL }}" | tr -d '[:space:]')" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$(printf '%s' "${{ secrets.VITE_SUPABASE_ANON_KEY }}" | tr -d '[:space:]')" >> "$GITHUB_ENV"
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
